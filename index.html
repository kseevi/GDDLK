<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GDDLK · Geometry Dash Demon List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-card: #15151f;
      --bg-card-hover: #1a1a26;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #5a5a72;
      --accent: #6c5ce7;
      --accent-glow: rgba(108, 92, 231, 0.3);
      --accent-gradient: linear-gradient(135deg, #6c5ce7, #a855f7);
      --demon: #00e396;
      --demon-glow: rgba(0, 227, 150, 0.2);
      --challenge: #f59e0b;
      --challenge-glow: rgba(245, 158, 11, 0.2);
      --border: #1e1e2e;
      --border-light: #2a2a3a;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light {
      --bg-primary: #f5f5fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f8f8ff;
      --text-primary: #1a1a2e;
      --text-secondary: #5a5a7a;
      --text-muted: #9999b0;
      --border: #e5e5f0;
      --border-light: #eeeef5;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 35px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(108, 92, 231, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
      background-attachment: fixed;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(17, 17, 24, 0.85);
      transition: 0.3s;
    }

    body.light .header {
      background: rgba(255, 255, 255, 0.85);
    }

    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--accent-gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .logo-text h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text span {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg-card);
      border-radius: 30px;
      padding: 4px;
      border: 1px solid var(--border);
    }

    .tab {
      padding: 0.55rem 1.4rem;
      border: none;
      background: transparent;
      border-radius: 26px;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .tab:hover:not(.active) {
      color: var(--text-primary);
    }

    /* Buttons */
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .icon-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Main Container */
    .main-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .hero-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .hero-badge.demon-badge {
      border-color: var(--demon);
      color: var(--demon);
      background: var(--demon-glow);
    }

    .hero-badge.challenge-badge {
      border-color: var(--challenge);
      color: var(--challenge);
      background: var(--challenge-glow);
    }

    .hero h2 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* List */
    .list-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .level-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .level-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent-gradient);
      opacity: 0;
      transition: var(--transition);
    }

    .level-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
      transform: translateX(4px);
      box-shadow: var(--shadow);
    }

    .level-card:hover::before {
      opacity: 1;
    }

    .rank-badge {
      font-weight: 800;
      font-size: 1.1rem;
      min-width: 3rem;
      text-align: center;
      color: var(--accent);
      background: rgba(108, 92, 231, 0.1);
      border-radius: 25px;
      padding: 0.3rem 0.6rem;
    }

    .rank-badge.top-1 {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #000;
      font-size: 1.2rem;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .rank-badge.top-2 {
      background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
      color: #000;
    }

    .rank-badge.top-3 {
      background: linear-gradient(135deg, #cd7f32, #a0522d);
      color: #fff;
    }

    .level-info {
      flex: 1;
      min-width: 0;
    }

    .level-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .level-creator {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .level-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .play-icon {
      color: var(--accent);
      font-size: 1.3rem;
      opacity: 0.6;
      transition: var(--transition);
    }

    .level-card:hover .play-icon {
      opacity: 1;
      transform: scale(1.1);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 850px;
      width: 100%;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      padding: 1.5rem 1.8rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .modal-header .creator {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 3px;
    }

    .modal-header .verifier {
      color: var(--demon);
      font-size: 0.8rem;
      margin-top: 2px;
      font-weight: 600;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .modal-close:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
      color: #ef4444;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
      color: var(--text-secondary);
    }

    .empty-state span {
      font-size: 0.85rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero h2 {
        font-size: 1.6rem;
      }

      .hero-stats {
        gap: 1.2rem;
      }

      .stat-value {
        font-size: 1.4rem;
      }

      .level-card {
        padding: 0.8rem 1rem;
        gap: 0.8rem;
      }

      .rank-badge {
        font-size: 0.9rem;
        min-width: 2.5rem;
      }

      .level-name {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo-group">
        <div class="logo-icon">⬡</div>
        <div class="logo-text">
          <h1>GDDLK</h1>
          <span>Demon List</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="tabs" id="tabs">
          <button class="tab active" data-list="demon">◈ Demon List</button>
          <button class="tab" data-list="challenge">🔥 Challenge</button>
        </div>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">🌓</button>
      </div>
    </div>
  </header>

  <main class="main-container">
    <div class="hero">
      <div class="hero-badge demon-badge" id="heroBadge">OFFICIAL LIST</div>
      <h2 id="heroTitle">Demon List</h2>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-label">Levels</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statTop">—</div>
          <div class="stat-label">#1 Demon</div>
        </div>
      </div>
    </div>

    <div class="list-container" id="listContainer">
      <div class="empty-state">
        <div class="icon">🏆</div>
        <p>No demons listed yet</p>
        <span>Check back soon for updates</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    GDDLK © 2024 &nbsp;·&nbsp; Geometry Dash Demon List &nbsp;·&nbsp; Inspired by Pointercrate
  </footer>

  <!-- Video Modal -->
  <div class="modal-overlay" id="videoModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="modalTitle">Level Name</h3>
          <div class="creator" id="modalCreator">by Creator</div>
          <div class="verifier" id="modalVerifier" style="display:none;"></div>
        </div>
        <button class="modal-close" id="closeModal">✕</button>
      </div>
      <div class="video-wrapper">
        <iframe id="youtubeFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // ДЕМОН ЛИСТ
    // ============================================================
    const DEMON_LIST = [
      // { name: "Название", creator: "Автор", verifier: "Верифер", videoUrl: "YouTube ссылка", id: "ID уровня" },
    ];

    const CHALLENGE_LIST = [
      {
        name: "Uncomfortable",
        creator: "oxyo0",
        verifier: "7u2",
        videoUrl: "https://www.youtube.com/watch?v=3aDY4lfFdGk",
        id: "140768797"
      },
    ];
    // ============================================================

    let currentList = "demon";

    function getList() {
      return currentList === "demon" ? DEMON_LIST : CHALLENGE_LIST;
    }

    function getRankClass(rank) {
      if (rank === 1) return "top-1";
      if (rank === 2) return "top-2";
      if (rank === 3) return "top-3";
      return "";
    }

    function render() {
      const list = getList();
      const container = document.getElementById("listContainer");

      // Stats
      document.getElementById("statCount").textContent = list.length;
      document.getElementById("statTop").textContent = list.length > 0 ? list[0].name : "—";

      // Badge
      const badge = document.getElementById("heroBadge");
      if (currentList === "demon") {
        badge.className = "hero-badge demon-badge";
        badge.textContent = "OFFICIAL LIST";
        document.getElementById("heroTitle").textContent = "Demon List";
      } else {
        badge.className = "hero-badge challenge-badge";
        badge.textContent = "CHALLENGE LIST";
        document.getElementById("heroTitle").textContent = "Challenge List";
      }

      if (list.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🏆</div>
            <p>No ${currentList === "demon" ? "demons" : "challenges"} listed yet</p>
            <span>Check back soon for updates</span>
          </div>`;
        return;
      }

      container.innerHTML = list
        .map(
          (d, i) => `
        <div class="level-card" 
             data-name="${d.name}" 
             data-creator="${d.creator || "Unknown"}" 
             data-verifier="${d.verifier || ""}" 
             data-id="${d.id || ""}" 
             data-video="${encodeURIComponent(d.videoUrl || "")}">
          <div class="rank-badge ${getRankClass(i + 1)}">#${i + 1}</div>
          <div class="level-info">
            <div class="level-name">${d.name}</div>
            <div class="level-creator">by ${d.creator || "Unknown"}</div>
            <div class="level-meta">
              ${d.verifier ? `Verified by ${d.verifier}` : ""} 
              ${d.id ? ` · ID: ${d.id}` : ""}
            </div>
          </div>
          <div class="play-icon">▶</div>
        </div>`
        )
        .join("");

      // Click handlers
      document.querySelectorAll(".level-card").forEach((card) => {
        card.addEventListener("click", () => {
          openVideo(
            card.dataset.name,
            card.dataset.creator,
            card.dataset.verifier,
            card.dataset.id,
            decodeURIComponent(card.dataset.video)
          );
        });
      });
    }

    function openVideo(name, creator, verifier, id, url) {
      document.getElementById("modalTitle").textContent = name;
      document.getElementById("modalCreator").textContent = "by " + (creator || "Unknown");
      
      const verifierEl = document.getElementById("modalVerifier");
      if (verifier) {
        verifierEl.style.display = "block";
        verifierEl.textContent = `Verified by ${verifier}` + (id ? ` · ID: ${id}` : "");
      } else {
        verifierEl.style.display = "none";
      }

      const frame = document.getElementById("youtubeFrame");
      let videoId = "";

      if (url) {
        const patterns = [
          /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
          /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
          /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
          /^([a-zA-Z0-9_-]{11})$/,
        ];

        for (const p of patterns) {
          const match = url.match(p);
          if (match) {
            videoId = match[1];
            break;
          }
        }
      }

      frame.src = videoId
        ? `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`
        : "";
      document.getElementById("videoModal").classList.add("active");
    }

    function closeVideo() {
      document.getElementById("videoModal").classList.remove("active");
      document.getElementById("youtubeFrame").src = "";
    }

    function switchList(type) {
      if (currentList === type) return;
      currentList = type;

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.list === type);
      });

      render();
    }

    // Events
    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => switchList(tab.dataset.list));
    });

    document.getElementById("themeToggle").addEventListener("click", () => {
      document.body.classList.toggle("light");
      localStorage.setItem(
        "gddlk_theme",
        document.body.classList.contains("light") ? "light" : "dark"
      );
    });

    document.getElementById("closeModal").addEventListener("click", closeVideo);
    document.getElementById("videoModal").addEventListener("click", function (e) {
      if (e.target === this) closeVideo();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeVideo();
    });

    // Theme init
    if (localStorage.getItem("gddlk_theme") === "light") {
      document.body.classList.add("light");
    }

    // Start
    render();
  </script>
</body>
</html>
