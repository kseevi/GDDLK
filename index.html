<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>GDDLK · Geometry Dash Demon List</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #111118;
      --bg-card: #15151f;
      --bg-card-hover: #1a1a26;
      --text-primary: #e8e8f0;
      --text-secondary: #8888a0;
      --text-muted: #5a5a72;
      --accent: #ef4444;
      --accent-glow: rgba(239, 68, 68, 0.3);
      --accent-gradient: linear-gradient(135deg, #ef4444, #f97316);
      --verified: #22c55e;
      --verified-glow: rgba(34, 197, 94, 0.2);
      --unverified: #f59e0b;
      --unverified-glow: rgba(245, 158, 11, 0.2);
      --challenge: #3b82f6;
      --challenge-glow: rgba(59, 130, 246, 0.2);
      --rules: #ec4899;
      --rules-glow: rgba(236, 72, 153, 0.2);
      --border: #1e1e2e;
      --border-light: #2a2a3a;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light {
      --bg-primary: #f5f5fa;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f8f8ff;
      --text-primary: #1a1a2e;
      --text-secondary: #5a5a7a;
      --text-muted: #9999b0;
      --border: #e5e5f0;
      --border-light: #eeeef5;
      --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 35px rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(239, 68, 68, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(249, 115, 22, 0.03) 0%, transparent 50%);
      background-attachment: fixed;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.3); }
      50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(17, 17, 24, 0.85);
      transition: 0.3s;
      animation: fadeIn 0.5s ease;
    }

    body.light .header {
      background: rgba(255, 255, 255, 0.85);
    }

    .header-inner {
      max-width: 1300px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--accent-gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 900;
      color: white;
      box-shadow: 0 4px 15px var(--accent-glow);
      animation: pulse 3s infinite;
    }

    .logo-text h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-text span {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .tabs {
      display: flex;
      background: var(--bg-card);
      border-radius: 30px;
      padding: 4px;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .tab {
      padding: 0.5rem 1.2rem;
      border: none;
      background: transparent;
      border-radius: 26px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 15px var(--accent-glow);
      animation: glow 2s infinite;
    }

    .tab:hover:not(.active) {
      color: var(--text-primary);
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .icon-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      animation: pulse 0.5s;
    }

    .lang-btn {
      padding: 0.5rem 0.8rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: var(--transition);
    }

    .lang-btn:hover {
      border-color: var(--accent);
    }

    .main-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeInUp 0.6s ease;
    }

    .hero-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .hero-badge.demon-verified {
      border: 1px solid var(--verified);
      color: var(--verified);
      background: var(--verified-glow);
    }

    .hero-badge.demon-unverified {
      border: 1px solid var(--unverified);
      color: var(--unverified);
      background: var(--unverified-glow);
    }

    .hero-badge.challenge-verified {
      border: 1px solid var(--challenge);
      color: var(--challenge);
      background: var(--challenge-glow);
    }

    .hero-badge.challenge-unverified {
      border: 1px solid #ef4444;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .hero-badge.rules {
      border: 1px solid var(--rules);
      color: var(--rules);
      background: var(--rules-glow);
    }

    .hero h2 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .list-container {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .level-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.4s ease both;
    }

    .level-card:nth-child(1) { animation-delay: 0.05s; }
    .level-card:nth-child(2) { animation-delay: 0.1s; }
    .level-card:nth-child(3) { animation-delay: 0.15s; }
    .level-card:nth-child(4) { animation-delay: 0.2s; }
    .level-card:nth-child(5) { animation-delay: 0.25s; }

    .level-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent-gradient);
      opacity: 0;
      transition: var(--transition);
    }

    .level-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
      transform: translateX(4px);
      box-shadow: var(--shadow);
    }

    .level-card:hover::before {
      opacity: 1;
    }

    .rank-badge {
      font-weight: 800;
      font-size: 1.1rem;
      min-width: 3rem;
      text-align: center;
      color: var(--accent);
      background: rgba(239, 68, 68, 0.1);
      border-radius: 25px;
      padding: 0.3rem 0.6rem;
    }

    .rank-badge.top-1 {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #000;
      font-size: 1.2rem;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      animation: glow 2s infinite;
    }

    .rank-badge.top-2 {
      background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
      color: #000;
    }

    .rank-badge.top-3 {
      background: linear-gradient(135deg, #cd7f32, #a0522d);
      color: #fff;
    }

    .level-info {
      flex: 1;
      min-width: 0;
    }

    .level-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .level-creator {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .level-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .play-icon {
      color: var(--accent);
      font-size: 1.3rem;
      opacity: 0.6;
      transition: var(--transition);
    }

    .level-card:hover .play-icon {
      opacity: 1;
      transform: scale(1.1);
    }

    .rules-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      animation: fadeInUp 0.5s ease;
    }

    .rules-content h3 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: var(--rules);
    }

    .rule-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
      animation: slideIn 0.4s ease both;
    }

    .rule-item:nth-child(1) { animation-delay: 0.1s; }
    .rule-item:nth-child(2) { animation-delay: 0.2s; }
    .rule-item:nth-child(3) { animation-delay: 0.3s; }
    .rule-item:nth-child(4) { animation-delay: 0.4s; }
    .rule-item:nth-child(5) { animation-delay: 0.5s; }
    .rule-item:nth-child(6) { animation-delay: 0.6s; }

    .rule-item:last-child { border-bottom: none; }

    .rule-number {
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--rules);
      min-width: 2rem;
      text-align: center;
      background: var(--rules-glow);
      border-radius: 10px;
      padding: 0.2rem 0.5rem;
    }

    .rule-item:hover .rule-number {
      animation: pulse 0.5s;
    }

    .rule-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 850px;
      width: 100%;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: fadeInUp 0.3s ease;
    }

    .modal-header {
      padding: 1.5rem 1.8rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-header h3 {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .modal-header .creator {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 3px;
    }

    .modal-header .verifier {
      color: var(--verified);
      font-size: 0.8rem;
      margin-top: 2px;
      font-weight: 600;
    }

    .modal-id {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      display: inline-block;
      padding: 3px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      user-select: all;
    }

    .modal-id:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(239, 68, 68, 0.1);
    }

    .modal-id.copied {
      color: var(--verified);
      border-color: var(--verified);
      background: var(--verified-glow);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
      color: #ef4444;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      animation: fadeIn 0.5s ease;
    }

    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
      color: var(--text-secondary);
    }

    .empty-state span {
      font-size: 0.85rem;
    }

    .footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero h2 {
        font-size: 1.6rem;
      }

      .hero-stats {
        gap: 1.2rem;
      }

      .stat-value {
        font-size: 1.4rem;
      }

      .level-card {
        padding: 0.8rem 1rem;
        gap: 0.8rem;
      }

      .rank-badge {
        font-size: 0.9rem;
        min-width: 2.5rem;
      }

      .level-name {
        font-size: 0.95rem;
      }

      .tabs {
        gap: 2px;
      }

      .tab {
        padding: 0.4rem 0.8rem;
        font-size: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo-group">
        <div class="logo-icon">GD</div>
        <div class="logo-text">
          <h1>GDDLK</h1>
          <span data-lang="logo">Demon List</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="tabs" id="tabs">
          <button class="tab active" data-list="demon-verified" data-lang="tab1">Demon List</button>
          <button class="tab" data-list="demon-unverified" data-lang="tab2">Unverified Demons</button>
          <button class="tab" data-list="challenge-verified" data-lang="tab3">Challenge List</button>
          <button class="tab" data-list="challenge-unverified" data-lang="tab4">Unverified Challenges</button>
          <button class="tab" data-list="rules" data-lang="tab5">Rules</button>
        </div>
        <button class="lang-btn" id="langToggle">RU</button>
        <button class="icon-btn" id="themeToggle" title="Switch to light theme">Light</button>
      </div>
    </div>
  </header>

  <main class="main-container">
    <div class="hero">
      <div class="hero-badge demon-verified" id="heroBadge" data-lang="badge">VERIFIED</div>
      <h2 id="heroTitle" data-lang="title">Demon List</h2>
      <div class="hero-stats" id="heroStats">
        <div class="stat">
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-label" data-lang="stat1">Levels</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statTop">---</div>
          <div class="stat-label" data-lang="stat2">Number 1</div>
        </div>
      </div>
    </div>

    <div id="contentContainer">
      <div class="list-container" id="listContainer">
        <div class="empty-state">
          <div class="icon">#</div>
          <p data-lang="empty1">No levels listed yet</p>
          <span data-lang="empty2">Check back soon for updates</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    GDDLK &nbsp;&middot;&nbsp; <span data-lang="footer">Geometry Dash Demon List</span>
  </footer>

  <div class="modal-overlay" id="videoModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="modalTitle">Level Name</h3>
          <div class="creator" id="modalCreator">by Creator</div>
          <div class="verifier" id="modalVerifier" style="display:none;"></div>
          <div class="modal-id" id="modalId" style="display:none;" title="Click to copy ID">ID: <span id="modalIdValue"></span></div>
        </div>
        <button class="modal-close" id="closeModal">X</button>
      </div>
      <div class="video-wrapper">
        <iframe id="youtubeFrame" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // TRANSLATIONS
    // ============================================================
    const translations = {
      en: {

        tab1: "Demon List",
        tab2: "Unverified Demons",
        tab3: "Challenge List",
        tab4: "Unverified Challenges",
        tab5: "Rules",
        badge_verified: "VERIFIED",

        title_challenge: "Challenge List",
        title_challenge_unverified: "Unverified Challenge List",
        title_rules: "Rules",
        stat1: "Levels",
        stat2: "Number 1",
        empty1: "No levels listed yet",

        footer: "Geometry Dash Demon List",
        rules_title: "Rules for getting your level on the list",

        copy_id: "Click to copy ID",
        copied: "Copied!",
        verifier_label: "Verified by",
        theme_light: "Light",

      ru: {

        tab5: "Правила",
        badge_verified: "ПРОВЕРЕНО",
        badge_unverified: "НЕПРОВЕРЕНО",
        badge_rules: "ИНФОРМАЦИЯ",
        title_demon: "Демон Лист",
        title_demon_unverified: "Непроверенный Демон Лист",
        title_challenge: "Челлендж Лист",
        title_challenge_unverified: "Непроверенный Челлендж Лист",
        title_rules: "Правила",
        stat1: "Уровней",
        stat2: "Номер 1",
        empty1: "Пока нет уровней",
        empty2: "Скоро здесь будут обновления",
        footer: "Geometry Dash Демон Лист",
        rules_title: "Правила для попадания уровня в лист",
        verified_by: "Проверен",

        copy_id: "Нажми чтобы скопировать ID",
        copied: "Скопировано!",
        verifier_label: "Проверен",
        theme_light: "Свет",
        theme_dark: "Тьма"
      }
    };

    // ============================================================
    // DATA
    // ============================================================
    const DEMON_VERIFIED = [
      { name: "Dreamstep", creator: "noc621", verifier: "Knockie", videoUrl: "https://youtu.be/bF1U4AYQtPk", id: "130175576" },
    ];

    const DEMON_UNVERIFIED = [
      { name: "Phycadelica", creator: "Thetryguys", verifier: "", videoUrl: "https://youtu.be/K4_L0G7vWbM", id: "134063849" },
      { name: "Musuko", creator: "vilkabereal", verifier: "", videoUrl: "https://youtu.be/aBYWYFPJ830", id: "142957739" },
      { name: "Thermos", creator: "vilkabereal", verifier: "", videoUrl: "https://youtu.be/WbcQKI5eE2Y", id: "142918264" },
      { name: "Machine Park", creator: "ModularGD", verifier: "", videoUrl: "https://www.youtube.com/watch?v=sVDgGVrt6c8", id: "128216702" },
    ];

    const CHALLENGE_VERIFIED = [
      { name: "Uncomfortable", creator: "oxyo0", verifier: "7u2", videoUrl: "https://www.youtube.com/watch?v=3aDY4lfFdGk", id: "140768797" },
      { name: "Foggy", creator: "rals2.", verifier: "rals2.", videoUrl: "https://youtu.be/9ukoSl6Lq7w", id: "139711026" },
    ];

    const CHALLENGE_UNVERIFIED = [
      { name: "Revolution", creator: "oxyo0", verifier: "", videoUrl: "https://www.youtube.com/watch?v=HukLIaTYo-M", id: "134060764" },
      { name: "Overclock", creator: "Radishoffical", verifier: "", videoUrl: "https://youtube.com/watch?v=Eq2LXxAbRwk", id: "141237195" },
    ];

    const RULES = [
      "The level must NOT consist ENTIRELY of spam",
      "The level should preferably not contain copypaste",
      "Decorate however you want, even if it looks awful",
      "Put effort into your levels",
      "bla bla bla",
      "Doggie got 13% on Grief???!!!!",
    ];

    const RULES_RU = [
      "Уровень не должен состоять ПОЛНОСТЬЮ из спама",
      "В уровне не должно быть копипасты, желательно",
      "Декорируй как хочешь, даже если это ужасно",
      "Старайтесь над уровнями",
      "бла бла бла",
      "Doggie got 13% on Grief???!!!!",
    ];

    // ============================================================
    // STATE
    // ============================================================
    let currentList = "demon-verified";
    let isDarkMode = true;
    let currentLang = "en";

    function t(key) {
      return translations[currentLang][key] || key;
    }

    function getList() {
      switch(currentList) {
        case "demon-verified": return DEMON_VERIFIED;
        case "demon-unverified": return DEMON_UNVERIFIED;
        case "challenge-verified": return CHALLENGE_VERIFIED;
        case "challenge-unverified": return CHALLENGE_UNVERIFIED;
        default: return DEMON_VERIFIED;
      }
    }

    function getListTitle() {
      switch(currentList) {
        case "demon-verified": return t("title_demon");
        case "demon-unverified": return t("title_demon_unverified");
        case "challenge-verified": return t("title_challenge");
        case "challenge-unverified": return t("title_challenge_unverified");
        case "rules": return t("title_rules");
        default: return t("title_demon");
      }
    }

    function getBadgeClass() {
      switch(currentList) {
        case "demon-verified": return "demon-verified";
        case "demon-unverified": return "demon-unverified";
        case "challenge-verified": return "challenge-verified";
        case "challenge-unverified": return "challenge-unverified";
        case "rules": return "rules";
        default: return "demon-verified";
      }
    }

    function getBadgeText() {
      if (currentList === "rules") return t("badge_rules");
      return (currentList === "demon-verified" || currentList === "challenge-verified") ? t("badge_verified") : t("badge_unverified");
    }

    function getRankClass(rank) {
      if (rank === 1) return "top-1";
      if (rank === 2) return "top-2";
      if (rank === 3) return "top-3";
      return "";
    }

    function updateLangButton() {
      document.getElementById("langToggle").textContent = currentLang === "en" ? "RU" : "EN";
    }

    function applyLanguage() {
      document.querySelectorAll("[data-lang]").forEach(el => {
        const key = el.getAttribute("data-lang");
        if (translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });
      updateLangButton();
      render();
    }

    function updateThemeButton() {
      const btn = document.getElementById("themeToggle");
      btn.textContent = isDarkMode ? t("theme_light") : t("theme_dark");
      btn.title = isDarkMode ? "Switch to light theme" : "Switch to dark theme";
    }

    function applyTheme() {
      if (isDarkMode) {
        document.body.classList.remove("light");
      } else {
        document.body.classList.add("light");
      }
      updateThemeButton();
      localStorage.setItem("gddlk_theme", isDarkMode ? "dark" : "light");
    }

    function render() {
      const container = document.getElementById("contentContainer");
      const heroStats = document.getElementById("heroStats");
      const badge = document.getElementById("heroBadge");
      
      badge.className = "hero-badge " + getBadgeClass();
      badge.textContent = getBadgeText();
      document.getElementById("heroTitle").textContent = getListTitle();

      if (currentList === "rules") {
        heroStats.style.display = "none";
        const rulesArr = currentLang === "ru" ? RULES_RU : RULES;
        container.innerHTML = `
          <div class="rules-content">
            <h3>${t("rules_title")}</h3>
            ${rulesArr.map((rule, i) => `
              <div class="rule-item">
                <div class="rule-number">${i + 1}</div>
                <div class="rule-text">${rule}</div>
              </div>
            `).join("")}
          </div>
        `;
        return;
      }

      heroStats.style.display = "flex";
      const list = getList();

      document.getElementById("statCount").textContent = list.length;
      document.getElementById("statTop").textContent = list.length > 0 ? list[0].name : "---";

      document.querySelectorAll("[data-lang]").forEach(el => {
        const key = el.getAttribute("data-lang");
        if (translations[currentLang][key]) {
          el.textContent = translations[currentLang][key];
        }
      });

      if (list.length === 0) {
        container.innerHTML = `
          <div class="list-container">
            <div class="empty-state">
              <div class="icon">#</div>
              <p>${t("empty1")}</p>
              <span>${t("empty2")}</span>
            </div>
          </div>`;
        return;
      }

      container.innerHTML = `
        <div class="list-container">
          ${list.map((d, i) => `
            <div class="level-card" 
                 data-name="${d.name}" 
                 data-creator="${d.creator || "Unknown"}" 
                 data-verifier="${d.verifier || ""}" 
                 data-id="${d.id || ""}" 
                 data-video="${encodeURIComponent(d.videoUrl || "")}">
              <div class="rank-badge ${getRankClass(i + 1)}">#${i + 1}</div>
              <div class="level-info">
                <div class="level-name">${d.name}</div>
                <div class="level-creator">${t("by")} ${d.creator || "Unknown"}</div>
                <div class="level-meta">
                  ${d.verifier ? t("verified_by") + " " + d.verifier : ""} 
                  ${d.id ? ` \u00b7 ID: ${d.id}` : ""}
                </div>
              </div>
              <div class="play-icon">\u25b6</div>
            </div>
          `).join("")}
        </div>
      `;

      document.querySelectorAll(".level-card").forEach((card) => {
        card.addEventListener("click", () => {
          openVideo(
            card.dataset.name,
            card.dataset.creator,
            card.dataset.verifier,
            card.dataset.id,
            decodeURIComponent(card.dataset.video)
          );
        });
      });
    }

    function openVideo(name, creator, verifier, id, url) {
      document.getElementById("modalTitle").textContent = name;
      document.getElementById("modalCreator").textContent = t("by") + " " + (creator || "Unknown");
      
      const verifierEl = document.getElementById("modalVerifier");
      if (verifier) {
        verifierEl.style.display = "block";
        verifierEl.textContent = t("verified_by") + " " + verifier;
      } else {
        verifierEl.style.display = "none";
      }

      const idContainer = document.getElementById("modalId");
      const idValue = document.getElementById("modalIdValue");
      if (id) {
        idContainer.style.display = "inline-block";
        idValue.textContent = id;
        idContainer.classList.remove("copied");
        idContainer.title = t("copy_id");
        
        idContainer.onclick = function(e) {
          e.stopPropagation();
          navigator.clipboard.writeText(id).then(() => {
            idContainer.classList.add("copied");
            idContainer.title = t("copied");
            setTimeout(() => {
              idContainer.classList.remove("copied");
              idContainer.title = t("copy_id");
            }, 1500);
          });
        };
      } else {
        idContainer.style.display = "none";
      }

      const frame = document.getElementById("youtubeFrame");
      let videoId = "";

      if (url) {
        const patterns = [
          /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
          /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
          /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
          /^([a-zA-Z0-9_-]{11})$/,
        ];

        for (const p of patterns) {
          const match = url.match(p);
          if (match) {
            videoId = match[1];
            break;
          }
        }
      }

      frame.src = videoId
        ? `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`
        : "";
      document.getElementById("videoModal").classList.add("active");
    }

    function closeVideo() {
      document.getElementById("videoModal").classList.remove("active");
      document.getElementById("youtubeFrame").src = "";
    }

    function switchList(type) {
      if (currentList === type) return;
      currentList = type;

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.list === type);
      });

      render();
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => switchList(tab.dataset.list));
    });

    document.getElementById("themeToggle").addEventListener("click", () => {
      isDarkMode = !isDarkMode;
      applyTheme();
    });

    document.getElementById("langToggle").addEventListener("click", () => {
      currentLang = currentLang === "en" ? "ru" : "en";
      applyLanguage();
      localStorage.setItem("gddlk_lang", currentLang);
    });

    document.getElementById("closeModal").addEventListener("click", closeVideo);
    document.getElementById("videoModal").addEventListener("click", function (e) {
      if (e.target === this) closeVideo();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeVideo();
    });

    const savedTheme = localStorage.getItem("gddlk_theme");
    isDarkMode = savedTheme !== "light";
    applyTheme();

    const savedLang = localStorage.getItem("gddlk_lang");
    currentLang = savedLang || "en";
    applyLanguage();

    render();
  </script>
</body>
</html>
